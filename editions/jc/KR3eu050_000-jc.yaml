front:
  text: 序夫物之為物也有本乎天者也有成乎人者也本乎天者為性能之用而成乎人者致性外之用也水雖清冷火蒸則為熱金雖堅剛鑄瀉則如泥是合和之妙用而人功之所以並於天地也蓋醫之於藥制之於方則人巧既加而功用自異雖知其一藥之能不審方法之道得其功也難矣世之庸醫曾不留意於茲預寫病證漫投藥劑其驗不見則為方之咎屢移其治譬於射者射而不中反修於招也何功之有哉夫欲為良醫者不可不先達方法之道熟視病證之變凡病有內同而外異亦有內異而外同同不同異不異皆證之相似也故玉人患石之似玉相劍者患劍之似刀相似之物愚者之所大惑而智者之所加慮也頃者播之田願仲作一冊子名曰長沙證匯蓋此著也集長沙論中其病狀之相似者建門分類各載其主方欲使無疑惑之患是田氏之所篤於醫而猷之所以好其志也書以題此卷首寬政二年庚戌之春平安吉益猷修夫題長沙正經證匯序夫仲景氏方論悉古之遺訓而對證奏效焉後之業醫者亦莫不講焉然其文高古往往意在文外得其旨趣最難矣且雜之以陰陽傳經脈說或曰補曰能曰寒熱相協成說是皆古疾醫所不論大失經義矣遂使後人不知古之方方各有妙而存者二千有餘年矣舉世莫能覺悟焉方今國運隆盛醫亦益造其道然多拘因名而隨證案方者特鈔矣間有知之者亦不察依證之淺深緩急而方亦異焉余深以為憂於是就仲景氏書輯其方證相對者分門聚類始能為編藏之家久矣近濱天祐奧元純二生請梓以公之世使一時醫者知治術妙用唯在證方相的當而無復餘論也已余深好其志再加釐正以授之雖未能盡得方意庶幾乎免捨本求末之譏云爾日本寬政庚戌春三月田中榮信撰長沙證匯序方法醫本也古今無有異議焉但唐宋以還名家方論方匯陸續鄭重奚翅千百云也乎從乎由漢以前周秦疾醫之道史傳不載廑廑乎其方甚深後世安得廣施之人邪才有仲景氏遺論傷寒金匱二書而見之而已今閱此冊則分證立病門參照彼二書錄各方於其下錯綜銓次深造其理因命曰長沙證匯誠前人所以悉後今人所以識古乃本立道生是作者微旨也作者則播州暈浦老醫田中願仲矣予素不解方伎然唯喜此人有好古之名而獎就四方之土敢附一辭云寬政三年辛亥十月穀旦浪華後學播州奧田元繼識長沙正經證匯後序古之良醫者不察聲形而分病之在膏肓矣故苟欲為良醫者必先方法焉曩日吾張海先生就傷寒金匱二經因證立門聚方其亦示以人小子名曰長沙正經證匯閟而不出者數年所焉古人所謂方證相的當者目擊道存矣雖秦漢疾醫豈亦外於此也乎頃日請之先生再加釐正且附方劑書卷末肇縷梓庶乎使後學之士解方證疑惑之憂焉爾若夫先生之微旨則有逢原一書不具於此於時寬政二年庚戌季春日受業門人浪速奧田元純謹題並書
