body:
  text: 嘔吐門附唾涎沫噫噦諸嘔吐谷不得下者小半夏湯嘔家本渴渴者為欲解今反不渴心下有支飲故也同方胃反嘔吐者大半夏湯食谷欲嘔者吳茱萸湯食已即吐者大黃甘草湯嘔而發熱者小茈胡湯傷寒五六日嘔而發熱者同方妊娠嘔吐不止乾薑人參半夏丸傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯太陽與陽明合病不下利但嘔者葛根加半夏湯太陽中風汗自出淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯產後中風續得之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出者同方上十二法嘔吐不得食或發熱證嘔心下痞硬者大半夏湯嘔而腸鳴心下痞者半夏瀉心湯傷寒中風醫反下之其人下利日數十行穀不化腹下雷鳴心下痞硬而滿乾嘔心煩不得安甘草瀉心湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者十棗湯傷寒發熱汗出不解心下痞硬嘔吐而下利者大茈胡湯太陽病過經十餘日反二三下之後四五日茈胡證仍在者先與小茈胡湯嘔不止心下急鬱郁微煩者大茈胡湯卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯乾嘔下利者黃芩人參湯乾嘔而利者黃芩加半夏生薑湯上九法嘔吐心下痞硬下利證少陰病吐利手足厥冷煩躁欲死者吳茱萸湯嘔而脈弱小便複利身有微熱見厥者四逆湯既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者同方吐利汗出發熱惡寒四肢拘急手足厥冷者同方少陰病飲食入口則吐心中溫溫欲吐復不能吐若膈上有寒飲乾嘔者不可吐也急溫之同方少陰病下利清穀裡寒外熱手足厥逆或乾嘔或咽痛通脈四逆湯少陰病下利不止厥逆無脈乾嘔煩者白通加豬膽汁湯上七法嘔吐下利厥逆證腹中寒氣雷鳴切痛胸脅逆滿嘔吐者附子粳米湯傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯諸黃腹痛而嘔者小茈胡湯上三法腹痛嘔吐證胃反吐而渴欲飲水者茯苓澤瀉湯吐後渴欲得水而貪飲者文蛤散少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯嘔吐而病在膈上後思水者豬苓散先渴後嘔為水停心下小半夏加茯苓湯中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散上六法嘔吐渴證傷寒六七日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔小茈胡湯陽明病脅下硬滿不大便而嘔舌上胎者同方本按本字玉函無太陽病不解脅下硬滿乾嘔不能食往來寒熱同方產婦云云大便堅嘔不能食者同方傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利茈胡加芒硝湯嘔而胸滿者吳茱萸湯上六法胸脅苦痛嘔證少陰病腹痛小便不利四肢沉重疼痛自下利或嘔者真武湯溫瘧者身無寒但熱骨節疼煩時嘔者白虎加桂枝湯傷寒六七日熱熱微惡寒支節疼煩微嘔心下支結者茈胡加桂枝湯上三法支節疼痛嘔證傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯傷寒云云得之便厥咽中干煩躁吐逆者甘草乾薑湯上二法吐逆證乾嘔吐涎沫頭痛者吳茱萸湯婦人吐涎沫小青龍湯傷寒表不解心下有水氣乾嘔發熱而咳或喘者同方乾嘔吐逆吐涎沫者半夏乾薑散咳逆上氣時時唾濁但坐不得眠者皂莢丸咳逆倚息不得臥小青龍湯時覆冒者苓桂五味甘草湯反更咳胸滿者苓甘五味姜辛湯冒者必嘔嘔者復內半夏苓甘姜味辛夏湯假令瘦人臍下悸吐涎沫而癲眩此水也五苓散蛔蟲之為病令人吐涎沫心痛發作有時甘草粉蜜湯大病差後喜唾久不了了者理中丸上九法乾嘔咳吐涎沫證肺痿吐涎沫者桂枝去芍藥加皂莢湯肺痿咳唾涎沫不止咽燥而渴者生薑甘草湯肺痿吐涎沫而不咳者甘草乾薑湯咳而胸滿振寒咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯同證桔梗白散上五法肺痿肺癰涎沫濁唾證發汗吐下後虛煩不得眠心中懊憹若嘔者梔子生薑豉湯胸滿心下堅咽中怗怗如有炙肉吐之不出吞之不下者半夏厚朴湯心胸中有停痰宿水自吐出後心胸間虛氣滿不能食茯苓飲鱠食之在心胸間不化吐復不出速下除之橘皮大黃朴硝湯病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈生薑半夏湯太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩者調胃承氣湯陽明病不吐不下心煩者同方上七法病在心胸中欲嘔吐不出證傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯傷寒汗出解之後胃中不和心下痞硬干按干字下脫嘔字噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯上二法心下痞硬噯證乾嘔噦若手足厥者橘皮湯噦逆者橘皮竹茹湯黃疸病小便色不變欲自利腹滿而喘噦者小半夏湯大便不通噦數讝語者小承氣湯上四法噦逆證大便不通門附硬難中惡心痛腹脹大便不通者走馬湯少陰病六七日腹脹不大便者急下之大承氣湯大下後六七日不大便煩不解腹滿痛者此有燥屎也同方陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者可攻裡大承氣湯發熱惡寒若腹大滿不通者小承氣湯上四法大便不通腹脹滿證傷寒若吐若下後不解不大便五六日上至十餘曰日晡所發潮熱不惡寒獨語如見鬼狀但發熱讝語者大承氣湯陽明病讝語有潮熱反不能食者胃中必有爆屎也同方二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈同方產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱者不食食則讝語同方傷寒六七日目中不了了睛不和無表裡按里字衍證大便難身微熱者同方病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也同方得病二三日云云須小便利屎定硬乃可攻之同方陽明病潮熱大便微硬者可與大承氣湯不硬者不與之陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語小承氣湯大便不通噦數讝語者同方太陽病若吐若下若發汗微煩小便數大便因硬者同方傷寒不大便六七日頭痛有熱者同方上十二法不大便讝語有燥屎證傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴若其人大便鞭小便自利者桂枝附子去桂加朮湯陽明病自汗出若發汗小便自利者硬此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導太陽病云云小便數者大便必硬不更衣十日無所苦也渴欲飲水者五苓散大便則難其脾為約麻仁丸痛而閉者厚朴三物湯上五法不大便鞭難證陽明病脅下硬滿不大便而嘔舌上白胎者小茈胡湯產婦云云大便堅嘔不能食者同方上二法不大便嘔證陽明證其人喜忘者必有畜血屎雖硬大便反易其色必黑抵當湯病人無表裡證發熱七八日雖脈浮數者可下之不大便者有瘀血同方上二法大便鞭有瘀血證小便不利門附難自利自調小便不利者茯苓戎鹽湯小便不利者蒲灰散小便不利者滑石白魚散服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加苓朮湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也大承氣湯少陰病二三日至四五日腹痛小便不利下利便膿血者桃花湯虛勞腰痛小腹拘急小便不利者八味丸上七法小便不利或腹痛證傷寒表不解心下有水氣乾嘔發熱而咳或小便不利少腹滿或喘者小青龍湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者桂枝甘草附子湯妊娠有水氣身重小便不利灑淅惡寒起即頭眩者葵子茯苓散少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者真武湯上四法小便不利有水氣證黃疸腹滿小便不利而赤自汗出大黃硝石湯里水者一身面目黃腫其脈沉小便不利故令病水越婢加朮湯黃汗之病兩脛自冷又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利桂枝加黃耆湯傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃同方太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯男子黃小便自利小建中湯黃疸病小便色不變欲自利腹滿而喘不可除熱除熱必噦噦者小半夏湯上八法小便不利或自利黃疸證傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或心下悸小便不利者小茈胡湯傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔茈胡桂薑湯傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者茈胡加龍骨牡蠣湯上三法胸脅苦滿小便不利證太陽病發汗後若脈浮小便不利微熱消渴者五苓散本以下之故心下痞與瀉心湯痞不解渴而口躁煩小便不利者五苓散陽明病脈浮而緊咽燥口苦腹滿而喘若脈浮發熱渴欲飲水小便不利者豬苓湯小便不利者有水氣其人若渴者栝蔞瞿麥丸上四法小便不利渴證太陽病發汗遂漏不止其人惡風小便難四肢微急難屈伸者桂枝加附子湯咳逆倚息不得臥云云手足厥逆氣從小腹上衝胸咽手足痹其面翕然如醉狀因復下流陰股小便難時覆冒者苓桂五味甘草湯妊娠小便難飲食如故者歸母苦參丸婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯上四法小便難證傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便鞭小便自利者桂枝附子去桂加朮湯陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之大豬膽汁方及土瓜根方若腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故苓薑朮甘湯太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈抵當湯上四法小便自利證太陽病若吐若下若發汗微煩小便數大便因硬者小承氣湯傷寒脈浮自汗出小便數心煩微惡寒腳攣急云云甘草乾薑湯芍藥甘草湯肺痿吐涎沫而不咳者其人不渴必遺尿小便數者甘草乾薑湯上三法小便數證夫短氣有微飲當從小便去之八味丸婦人病飲食如故煩熱不得臥而反倚息者但利小便則愈同方夫短氣有微飲當從小便去之苓桂朮甘湯諸病黃家但利其小便假令脈浮當以汗解之桂枝加黃耆湯上四法當利小便證太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯陽明病發潮熱大便溏小便自可胸脅滿不去者小茈胡湯傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也桂枝湯腸癰者小腹腫按之即痛如淋小便自調時時發熱自汗出復惡寒大黃牡丹湯上四法小便自可證嘔而脈弱小便複利身在微熱見厥者四逆湯既吐且利小便複利而大汗出下利清穀同方傷寒有熱少腹滿應小便不利今反利者為有血也抵當丸男子消渴小便反多以飲一斗小便一斗八味丸上四法小便複利證上衝門附上氣氣逆太陽病下之後其氣上衝者可與此方桂枝湯燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者桂枝加桂湯傷寒若吐若下後心下厥滿氣上衝胸起則頭眩苓桂朮甘湯咳逆云云手足厥逆氣從小腹上衝胸咽手足痹其面翕然如醉狀因復下流陰股小便難時覆冒者苓桂五味甘草湯治其氣衝若面熱如醉狀此為胃熱上衝熏其面加大黃以利之苓乾薑味辛夏仁黃湯心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近者大建中湯太陽病無汗而小便反少氣上衝胸口噤不得語葛根湯病如桂枝證頭不痛項不強胸中痞硬氣上衝咽喉不得息者瓜蒂散上七法上衝心胸證大逆上氣咽喉不利者麥門冬湯咳逆上氣時時唾濁但坐不得眠者皂莢丸咳而上氣此為肺脹其人喘目如脫狀越婢加半夏湯肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗湯心下痞諸逆心懸痛者桂枝枳實生薑湯傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯胸痹心中痞留氣結在胸胸滿脅下逆搶心者人參湯同證枳實薤白桂枝湯上八法上氣氣逆證腹痛門附滿脹少腹滿痛心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停屍卒死者三物備急丸心腹卒中痛者茈胡桂枝湯治中惡心痛腹脹大便不通走馬湯上三法心腹卒痛證腹中寒氣雷鳴切痛胸脅逆滿嘔吐者附子粳米湯心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近大建中湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或腹中痛者小茈胡湯諸黃腹痛而嘔者同方傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯上五法腹中痛嘔吐證婦人懷妊腹中㽲痛當歸芍藥散婦人腹中諸疾痛者同方婦人有漏下或妊娠下血若腹中痛者芎歸膠艾湯產後腹痛煩滿不得臥枳實芍藥散產後腹痛以枳實芍藥散不愈者此為腹中有乾血著臍下瘀血湯上五法婦人腹中痛證寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治烏頭桂枝湯腹痛云云寒疝繞臍苦痛發則自汗出手足厥冷大烏頭煎寒疝腹中絞痛拘急不得轉側發作有時使人陰縮手足厥逆烏頭湯寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯產後腹中㽲痛並治寒疝同方上五法寒疝腹中痛證傷寒腹中急痛者先與小建中湯不差者與小茈胡湯虛勞裡急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥小建中湯婦人腹中痛同方治婦人產後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰背不能食飲當歸建中湯上四法腹中裡急痛證少陰病至四五日腹痛小便不利四肢沉重疼痛自下利者真武湯少陰病至四五日腹痛小便不利下利不止便膿血者桃花湯上二法腹痛小便不利證發汗不解腹滿痛者急下之大承氣湯病腹中滿痛者此為實也同方大下後六七日不大便煩不解腹滿痛者此有燥屎也同方本太陽病醫反下之因爾腹滿時痛者桂枝加芍藥湯大實痛者桂枝加大黃湯痛而閉者厚朴三物湯陽明中風脈弦浮大而短氣腹都滿脅下及心痛小茈胡湯上七法腹滿痛證腹滿不減減不足言大承氣湯少陰病六七日腹脹不大便者同方陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也同方若腹大滿不通者可與小承氣湯病腹滿發熱十日脈浮而數飲食如故厚朴七物湯傷寒吐後腹脹滿者調胃承氣湯太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩同方發汗後腹脹滿者樸姜甘半參湯腹滿口舌乾燥此膈間有水氣己椒藶黃丸二陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿白虎湯傷寒下後心煩腹滿臥起不安者梔子厚朴湯下利腹脹滿身體疼痛者先溫里乃攻其表溫里四逆湯攻表桂枝湯陽明病脈浮而聚咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重心中懊憹舌上胎者梔子豉湯上十二法腹脹滿或不大便證黃疸腹滿小便不利而赤自汗出大黃硝石湯傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯黃疸病小便色不變欲自利腹滿而喘噦者小半夏湯黃家日晡所發熱而反惡寒膀胱急小腹滿如水狀大便必黑時溏者消礬散上四法腹滿黃疸證太陽病不解熱結膀胱其人如狂血自下下者愈但少腹急結者桃核承氣湯虛勞腰痛小腹拘急小便不利者八味丸腳氣上入少腹不仁者同方夫失精家小腹弦急陰頭寒目眩發落桂枝加龍骨牡蠣湯天雄散上四法小腹拘急證太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯傷寒有熱少腹滿應小便不利今反利者為有血也抵當丸太陽病六七日表證仍在脈微而沉不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈抵當湯太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也同方產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱云云大承氣湯帶下經水不利少腹滿痛經一月再見者土瓜根散婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒大黃牡丹湯傷寒表不解心下有水氣乾嘔發熱而咳或小便不利小腹滿或喘者小青龍湯上九法少腹滿痛有瘀血證結胸門附胸痹傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯傷寒五六日嘔而發熱者云云若心下滿而硬痛者此為結胸也同方太陽病脈浮而動數膈內拒痛短氣躁煩心中懊憹心下因硬則為結胸同方傷寒十餘日熱結在裡復往來寒熱者與大茈胡湯但結胸無大熱者此為水結在胸脅也同方結胸者項亦強如柔痙狀下之則和大陷胸丸小結胸病正在心下按之則痛小陷胸湯病在陽應以汗解之云云寒實結胸無熱證者同方白散病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者當須吐之瓜蒂散病如桂枝證頭不痛項不強胸中痞硬氣上衝嘔喉不得息者同方上九法結胸證胸痹胸中氣塞短氣者茯苓杏仁甘草湯胸痹胸中氣塞短氣者橘皮枳實生薑湯胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯同證人參湯胸痹緩急者薏苡附子散胸痹不得臥心痛徹背者栝蔞薤白半夏湯胸痹之病喘息咳唾胸者痛短氣者栝蔞薤白白酒湯上七法胸痹證心下痞硬門附痞心中痞堅滿傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安甘草瀉心湯傷寒汗出解之後胃中不和心下痞硬乾嘔噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯嘔而腸鳴心下痞者半夏瀉心湯傷寒五六日嘔而發熱茈胡證具云云若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者為痞半夏瀉心湯嘔心下痞硬者大半夏湯傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆花代赭石湯太陽病外證未除而數下之遂協熱而利利下不止心下痞硬者桂枝人參湯傷寒發熱汗出不解心下痞硬嘔吐而下利者大茈胡湯傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚赤石脂禹餘糧湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者十棗湯上十法心下痞硬嘔下利證卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯心下痞按之濡者大黃黃連瀉心湯傷寒大下後復發汗心下痞惡寒者表未解也表解乃可攻痞攻痞瀉心湯攻表桂枝湯婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯本以下之故心下痞與瀉心湯痞不解其人渴而口躁煩小便不利者五苓散心下痞而復惡寒汗出者附子瀉心腸上六法心下痞證膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈者木防己湯木防己去石膏加茯苓芒硝湯心下堅大如盤邊如旋杯水飲所作桂薑棗草黃辛附湯同證枳朮湯太陽病脈浮而動數短氣躁煩心中懊憹心下因硬則為結胸大陷胸湯傷寒五六日嘔而發熱云云若心下滿而硬痛者此為結胸也同方傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者同方太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近同方病者脈伏其人慾自利利反快雖利心下續堅滿甘遂半夏湯下利按之心下硬者急下之大承氣湯上九法心下堅硬證按之心下滿痛者大茈胡湯服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓朮湯傷寒若吐若下後心下逆滿氣上衝胸起則頭眩苓桂朮甘湯心下有痰飲胸脅支滿目眩者同方心痛徹背背痛徹心赤丸上五法心下滿痛證胸痹心中痞留氣結在胸胸滿脅下逆搶心人參湯同證枳實薤白桂枝湯心中痞諸逆心懸痛者桂枝枳實生薑湯傷寒五六日大下之後身熱不去心中結痛者梔子豉湯上四法下痞或痛證胸脅苦滿門附痛傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔者小茈胡湯太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與茈胡湯六脈俱浮者與麻黃湯陽明病發潮熱大便溏小便自可胸脅滿不去者小茈胡湯本太陽病不解脅下硬滿乾嘔不能食往來寒熱同方傷寒四五日身熱惡風頸項強脅下滿手足溫而遏者同方陽明病脅下硬滿不大便而嘔舌上白胎者同方傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利云云先宜小茈胡湯以解外後茈胡加芒硝湯傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔茈胡桂薑湯腹中寒氣雷鳴切痛胸脅逆滿嘔吐者附子粳米湯心下有痰飲胸脅支滿目眩者苓桂朮甘湯上十法胸脅滿或嘔證支飲胸滿者厚朴大黃湯嘔而胸滿者吳茱萸湯太陽病下之後脈促胸滿者若惡寒者加附子桂枝去芍藥湯咳而倚息云云而反更咳胸滿者苓甘五味姜辛湯咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿寒如米粥者為肺癰桔梗湯同證桔梗白散太陽與陽明合病喘胸滿者麻黃湯傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者茈胡加龍骨牡蠣湯肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯上九法胸滿或咳證夫有支飲家咳煩胸中痛者十棗湯咳而引脅下痛者同方太陽中風下利嘔逆云云頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者同方太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩者調胃承氣湯咳有微熱煩滿胸中甲錯是為肺癰葦莖湯發汗若下之而煩熱胸中窒者梔子豉湯病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈生薑半夏湯心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近者大建中湯心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食者茯苓飲脅下偏痛發熱其脈緊弦者大黃附子湯病如桂枝證頭不痛項不強胸中痞硬氣上衝咽喉不得息者當吐之瓜蒂散上十一法胸中痛或脅下痛證心下悸門附臍下悸心下悸者半夏麻黃丸傷寒厥而心下悸者茯苓甘草湯發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或心下悸小便不利小茈胡湯卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯上六法心下悸證傷寒二三日心中悸而煩者小建中湯虛勞裡急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥同方發汗後其人臍下悸者欲作奔豚苓桂甘棗湯假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散上四法心中悸或臍下悸證惡寒門附惡風往來寒熱振寒太陽中風嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯太陽病頭痛發熱汗出惡風者同方陽明病脈遲汗出多微惡寒者同方產後中風續得之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出者同方傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表桂枝湯攻痞大黃黃連瀉心湯心下痞而復惡寒汗出者附子瀉心湯太陽病脈浮而動數頭痛發熱微盜汗出而反惡寒者表未解也醫反下之膈內拒痛短氣躁煩心中懊憹心下因硬則為結胸大陷胸湯陽明病脈遲雖汗出不惡寒者云云大承氣湯主之若汗多微惡寒者外未解也若腹大滿不通者小承氣湯腸癰者小腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒也大黃牡丹湯上九法惡寒發熱汗出證太陽中風脈緊發熱惡寒身疼痛不汗出而煩躁大青龍湯傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者茈胡加桂枝湯太陽病發熱惡寒熱多寒少脈微弱者桂枝二越婢一湯太陽病得之七八日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也桂枝麻黃各半湯上四法惡寒發熱不汗出證大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯吐利汗出發熱惡寒四肢拘急手足厥冷者同方傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐厥者甘草乾薑湯發汗病不解反惡寒者芍藥甘草附子湯惡寒脈微而複利四逆加人參湯太陽病下之後脈促胸滿而若惡寒者桂枝去芍藥加附子湯少陰病得之一二日口中和其背惡寒者當灸之附子湯上七法汗吐下後惡寒或厥冷證黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿云云消礬散谷疸之為病寒熱不食食則頭眩心胸不安久久發黃茵陳蒿湯里水者一身面目黃腫其脈沉小便不利惡風者越婢加朮湯上三法惡寒發黃證太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣身微腫者桂枝甘草附子湯風濕脈浮身重汗出惡風者防己黃耆湯妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散上五法汗出惡風證太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯太陽病項背強𠘧𠘧無汗惡風者葛根湯上二法無汗惡風證太陽中熱者暍是也汗出惡寒身熱而渴者白虎加人參湯傷寒無大熱口燥渴心煩背微惡寒者同方傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者同方上三法惡寒渴證傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔小茈胡湯傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者同方婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室同方本太陽病不解脅下硬滿乾嘔不能食往來寒熱者同方傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者茈胡桂薑湯瘧寒多微有熱或但寒不熱者同方傷寒十餘日熱結在裡復往來寒熱者大茈胡湯瘧多寒者名牡瘧蜀漆散牡瘧牡蠣湯上九法寒熱往來及瘧證咳而胸滿振寒咽乾不渴時出濁唾腥臭久久吐膿寒如米粥者桔梗湯同證桔梗白散上二法振寒證厥冷門附厥逆吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯大汗出大下利而厥冷者同方嘔而脈弱小便複利身有微熱見厥者同方大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者同方下利清穀裡寒外熱汗出而厥者通脈四逆湯少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒同方吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯少陰病吐利手足厥冷煩躁欲死者吳茱萸湯上九法手足厥冷吐利證寒疝腹中絞痛拘急不得轉側發作有時使人陰縮手足厥逆烏頭湯寒疝繞臍苦痛發則自汗出手足厥冷其脈沉弦者大烏頭煎寒疝腹中痛逆冷手足不仁若身疼痛烏頭桂枝湯寒氣厥逆者赤丸上四法寒疝厥逆證病人手足厥冷脈乍緊者邪結在胸中心中滿而煩瓜蒂散乾嘔噦若手足厥者橘皮湯咳逆云云手足厥逆氣從小腹上衝胸咽手足痹其面翕然如醉狀因復下流陰股小便難時覆冒者苓桂五味甘草湯傷寒脈滑厥者里有熱也白虎湯手足厥寒脈細欲絕者當歸四逆湯上五法手足厥冷證傷寒厥而心下悸者茯苓甘草湯傷寒脈浮自汗出小便數心煩微惡寒云云得之便厥咽中干煩躁吐逆者甘草乾薑湯厥而皮水者蒲灰散蛔厥者烏梅丸少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者云云若膈上有寒飲乾嘔者四逆湯少陰病身體痛手足寒骨節痛脈沉者附子湯上六法厥或手足寒證煩門太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈桂枝湯傷寒發汗解半日許復煩者同方傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者茈胡加龍骨牡蠣湯傷寒二三日心中悸而煩者小建中湯虛勞裡急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥者同方少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯夫有支飲家咳煩胸中痛者十棗湯咳有微熱煩滿胸中甲錯是為肺癰葦莖湯上八法煩證火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯太陽中風脈緊發熱惡寒身疼痛不汗出而煩躁大青龍湯發汗若下之病仍不解煩躁者茯苓四逆湯少陰病吐利手足厥冷煩躁者吳茱萸湯黃汗之病云云劇者不能食身疼重煩躁小便不利桂枝加黃耆湯得病二三日脈弱無太陽茈胡證煩躁心下硬云云小承氣湯大承氣湯產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱云云同方大下後六七日不大便煩不解腹滿痛者同方陽明病下之心中懊憹而煩胃中有燥屎者同方太陽病脈浮而數膈內拒痛短氣躁煩心中懊憹心下因硬則為結胸大陷胸湯上十法煩躁證虛勞虛煩不得眠者酸棗仁湯發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯下利後更煩按之心中濡者為虛煩同方下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證乾薑附子湯傷寒脈浮自汗出小便數心煩微惡寒腳攣急云云得之便厥咽中干煩躁吐逆者甘草乾薑湯產後腹痛煩滿不得臥者枳實芍藥散婦人病飲食如故煩熱不得臥而反倚息者但利小便則愈八味丸上七法煩躁不得眠證傷寒下後心煩腹滿臥起不安者梔子厚朴湯少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯少陰病得之二三日以上心中煩不得臥者黃連阿膠湯陽明病不吐不下心煩者調胃承氣湯病人手足厥冷脈乍緊者邪結於胸中心中滿而煩飢不能食者瓜蒂散傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安甘草瀉心湯傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者茈胡桂薑湯少陰病下利咽痛胸滿心煩者豬膚湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔者小茈胡湯上九法心煩證服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者同方傷寒無大熱口燥渴心煩背微惡寒者同方發汗已脈浮數煩渴者五苓散中風發熱六七日不解而煩者有表裡證渴欲飲水水入則吐者同方本以下之故心下痞與瀉心湯痞不解其人渴而口躁煩小便不利者同方病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散不差者五苓散上七法煩渴證傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴桂枝附子湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣桂枝甘草附子湯濕家身煩疼麻黃加朮湯傷寒六七日發熱微惡寒支節煩疼微嘔心下支結茈胡加桂枝湯溫瘧者其脈如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯上五法煩疼證病人煩熱汗出則解又如瘧狀日晡所發熱脈實者宜下之脈浮虛者宜發汗大承氣湯桂枝湯婦人在草蓐自發露得風四肢苦煩熱頭痛者與小茈胡湯頭不痛但煩者三物黃芩湯發汗若下之而煩熱胸中窒者梔子豉湯上三法煩熱證太陽病過經十餘日云云茈胡證仍在者先與小茈胡湯嘔不止心下急鬱郁微煩者大茈胡湯太陽病若吐若下若發汗微煩小便數大便因硬者小承氣湯太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏復微滿鬱郁微煩者調胃承氣湯傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯上四法微煩證汗出門附黃汗盜汗太陽病頭痛發熱汗出惡風者桂枝湯太陽中風汗自出嗇嗇惡寒淅淅惡風翕翕發熱同方太陽病發熱汗出者同方陽明病脈遲汗出多微惡寒者同方產後中風續得之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出證同方病常自汗出者同方病人藏無他病時發熱自汗出者同方病人煩熱汗出則解又如瘧狀日晡所發熱者脈實者宜下之與大承氣湯脈浮虛者宜發汗桂枝湯服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解桂枝二麻黃一湯太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風桂枝甘草附子湯心下痞而復惡寒汗出者附子瀉心湯風濕脈浮身重汗出惡風者防己黃耆湯上十四法汗出惡風發熱證凡茈胡湯病證而下之若茈胡證不罷者復與茈胡湯必蒸蒸而振卻發熱汗出而解陽明病脅下硬滿不大便而嘔云云身濈然而汗出解也同方傷寒發熱汗出不解心下痞硬嘔吐而下利者大茈胡湯陽明病發熱汗出多者急下之大承氣湯太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動欲擗地者真武湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒十棗湯上六法汗出發熱證太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯服桂枝湯大汗出後大煩渴不解脈洪大者同方太陽病發汗後大汗出胃中乾燥不得眠欲飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散太陽病其人發熱汗出復惡寒不嘔云云渴者同方傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯上五法汗出渴證汗出讝語者以有燥屎在胃中也大承氣湯二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者同方陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語小承氣湯上三法汗出讝語證發汗後不可更行桂枝湯汗出而喘無大熱者麻黃杏仁甘草石膏湯下後不可更行桂枝湯汗出而喘無大熱者同方陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也汗多微發熱惡寒若腹大滿不通者小承氣湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重心中懊憹舌上胎者梔子豉湯上四法汗出喘證吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者同方下利清穀裡寒外熱汗出而厥者通脈四逆湯吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯上四法汗出吐利厥冷證風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之惡風者加附子腸癰者小腹腫按之即痛如淋小便自調時時發熱自汗出復惡寒也大黃牡丹湯傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者甘草乾薑湯芍藥甘草湯二陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿若自汗出者白虎湯寒疝繞臍苦痛發則自汗出手足厥冷其脈沉弦者大烏頭煎陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便蜜煎導大豬膽汁方上六法自汗出證黃汗之病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如蘗汁脈自沉黃耆桂枝苦酒湯黃汗之病云云從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀桂枝加黃耆湯黃疸腹滿小便不利而赤自汗出此為表和裡實大黃硝石湯陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此瘀熱在裡身必發黃茵陳蒿湯上四法黃汗證傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者茈胡桂薑湯太陽病脈浮而動數云云頭痛發熱微盜汗出而反惡寒云云心下因硬則為結胸大陷胸湯傷寒十餘日熱結在裡復往來寒熱者與大茈胡湯但結胸無大熱者此為水結在胸脅但頭微汗出者同方產婦鬱冒其脈微弱不能食大便反堅但頭汗出小茈胡湯風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下當腫及陰難以屈伸防己黃耆湯陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯上六法頭汗出證身疼痛門附骨節痛少陰病身體手足寒骨節痛脈沉者附子湯病歷節不可屈伸疼痛者烏頭湯腳氣疼痛不可屈伸同方寒疝腹中絞痛拘急不得轉側發作有時使人陰縮手足厥逆同方寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治烏頭桂枝湯少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者真武湯發汗後身疼痛脈沉遲者桂枝加芍藥人參生薑湯霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸病者一身盡疼發熱日晡所劇者麻黃杏仁薏苡甘草湯病發熱頭痛脈反沉若不差身體疼痛四逆湯上十法身疼痛或腹痛證下利後身疼痛清便自調者急當救表桂枝湯吐利止而身疼痛不休者同方下利腹脹滿身體疼痛者先溫其里乃四逆湯攻其表桂枝湯傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表同方上四法下利身疼痛證太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯太陽病脈浮緊無汗發熱身疼痛八九日不解同方太陽中風脈緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯上三法無汗身疼痛證太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯黃汗之病從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利桂枝加黃耆湯其人身體重腰中冷如坐水中形如水狀云云苓薑朮甘湯上四法汗出身疼痛證風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風桂枝甘草附子湯傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴若其人大便硬小便自利者桂枝附子去桂加朮湯濕家身煩疼麻黃加朮湯傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者茈胡加桂枝湯溫瘧者其脈如平身無寒但熱骨節疼煩時嘔者白虎加桂枝湯上五法骨節煩疼證頭痛門太陽病頭痛發熱汗出惡風者桂枝湯傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗同方產後中風續得之數十日不解頭微痛惡寒時時有熱同方婦人在草蓐自發露得風四肢苦煩熱頭痛者小茈胡湯乾嘔吐涎沫頭痛者吳茱萸湯太陽病脈浮而動數頭痛發熱微盜汗出而反惡寒者表未解也膈內拒痛心下因硬則為結胸大陷胸湯病發熱頭痛脈反沉者若不差身體疼痛當救其里四逆湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛十棗湯頭風摩散一方霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸上十法頭痛證頸項強門傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小茈胡湯得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者同方結胸者項亦強如柔痙狀下之則愈大陷胸丸服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓朮湯上四法頸項強證太陽病項背強𠘧𠘧無汗惡風者葛根湯太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯上三法項背強證渴門附口乾舌燥渴欲飲水不止者文蛤散傷寒汗出而渴者五苓散霍亂頭痛發熱身疼痛熱多欲飲水者同方太陽病小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者同方病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者五苓散瘧病發渴者茈胡去半夏加栝蔞湯下利慾飲水者以有熱故也白頭翁湯傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小茈胡湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或渴者同方肺痿咳唾涎沫不止咽燥而渴者生薑甘草湯太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱大陷胸湯黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣黃耆桂枝苦酒湯上十二法渴欲飲水證胃反吐而渴欲飲水者茯苓澤瀉湯吐後渴欲得水而貪飲者文蛤湯傷寒表未解心下有水氣乾嘔發熱而咳或渴小青龍湯先渴後嘔為水停心下小半夏加茯苓湯少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯嘔吐而病在膈上後思水者豬苓數中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐名曰水逆五苓散上七法嘔吐渴證小便不利者有水氣其人若渴者栝蔞瞿麥丸若脈浮發熱渴欲飲水小便不利者豬苓湯太陽病發汗後大汗出胃中干煩躁不得眠欲飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散本以下之故心下痞與瀉心湯痞不解其人渴而口躁煩小便不利者同方發汗已脈浮數煩渴者同方男子消渴小便反多以飲一斗小便一斗八味丸上六法渴小便不利證服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者同方傷寒無大熱口燥渴心煩背微惡寒者同方太陽中熱者暍是也汗出惡寒身熱而渴同方傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者同方陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若渴欲飲水口乾舌燥者同方上六法大煩渴引飲證虛勞裡急悸衄腹中痛夢失精四肢痠痛手足煩熱咽乾口燥者小建中湯少陰病得之二三日口燥咽乾者急下之大承氣湯少陰病自利清水色純青心下必痛口乾燥者急下之同方傷寒脈浮自汗出小便數心煩微惡寒腳攣急云云便厥咽中干煩躁吐逆者甘草乾薑湯咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿桔梗湯同證桔梗白散腹滿口舌乾燥此膈間有水氣己椒藶黃丸陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱心中懊憹舌上胎者梔子豉湯上八法口舌咽乾燥證頭眩門附冒眩傷寒若吐若下後心下逆滿氣上衝胸起則頭眩者苓桂朮甘湯心下有痰飲胸脅支滿目眩者同方太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯谷疸之為病寒熱不食食則頭眩心胸不安久久發黃茵陳蒿湯妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散上五法頭眩證假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散心下有支飲其人若冒眩澤瀉湯卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯夫失精家小腹弦急陰頭寒目眩發落者桂枝加龍骨牡蠣湯發汗過多其人叉手自冒心心下悸欲得按之者桂枝甘草湯咳逆倚息不得臥小青龍湯主之手足厥逆氣從小腹上衝胸咽手足痹時覆冒者苓桂五味甘草湯病人小便不利大便乍難乍易時有微熱喘冒不得臥者有燥屎也大承氣湯上七法冒眩悸證裡急門附拘攣痛傷寒腹中急痛者先與小建中湯不愈者與小茈胡湯主之虛勞裡急悸衄腹中痛夢失精四肢痠痛小建中湯虛勞裡急諸不足黃耆建中湯寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯夫失精家少腹弦急陰頭寒目眩發落者桂枝加龍骨牡蠣湯天雄散太陽病發汗遂漏不止其人惡風小便難四腫微急難而屈伸者桂枝加附子湯太陽病過經十餘日云云嘔不止心下急鬱郁微煩者大茈胡湯太陽病不解熱結膀胱其人如狂血自下下者愈但少腹急結者桃核承氣湯黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃其腹脹如水狀大便必溏消礬散上九法裡急痛證大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯吐利汗出發熱惡寒四肢拘急手足厥冷者同方吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯寒疝腹中絞痛拘急不得轉側發作有時使人陰縮手足厥逆烏頭湯虛勞腰痛小腹拘急小便不利者八味丸上五法拘急厥逆證傷寒脈浮自汗出小便數心煩微惡寒腳攣急芍藥甘草湯痙為病胸滿口噤臥不著席腳攣急必齘齒大承氣湯上二法攣急證轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散上一法轉筋證喘門附咳嗽喘家作桂枝加厚朴杏仁佳太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯黃疸病小便色不變欲自利腹滿而喘噦者小半夏湯胸痹之病喘息咳唾胸背痛短氣栝蔞薤白白酒湯病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈生薑半夏湯傷寒若吐若下後不解大便五六日發潮熱微喘直視脈弦者大承氣湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也同方上七法喘證太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯陽明病脈浮無汗而喘者同方太陽與陽明合病喘而胸滿者同方上三法無汗喘證發汗後不可更行桂枝湯汗出而喘無大熱者麻黃杏仁甘草石膏湯下後不可更行桂枝湯汗出而喘無大熱者同方太陽病桂枝證醫反下之利遂不止喘而汗出者葛根黃連黃芩湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱大承氣湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出云云心中懊憹舌上胎者梔子豉湯上五法汗出喘證傷寒表未解心下有水氣乾嘔發熱而咳或喘者小青龍湯傷寒心下有水氣咳而微喘發熱不渴者同方咳逆倚息不得臥小青龍湯主之云云反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或咳者小茈胡湯少陰病二三日不已至四五日腹痛小便不利四支沉重疼痛或咳者真武湯咳家其脈弦為有水十棗湯夫有支飲家咳煩胸中痛者同方咳逆上氣時時唾濁但坐不得眠莢皂丸上九法咳喘或發熱證咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯同證桔梗白散肺癰喘不得臥者葶藶大棗湯肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞同方咳有微熱煩滿胸中甲錯是為肺癰葦莖湯肺痿咳唾涎沫不止咽燥而渴者生薑甘草湯上六法肺癰咳喘證諸黃門黃疸病茵陳五苓散諸黃瓜蒂湯黃疸麻黃醇酒湯諸黃豬膏發煎傷寒身黃髮熱者梔子蘗皮湯諸黃家病但利其小便假令脈浮當以汗解之桂枝加黃耆湯黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃消礬散谷疸之為病寒熱不食食則頭眩心胸不安久久發黃茵陳蒿湯上八法黃疸發熱證黃疸腹滿小便不利而赤自汗出大黃硝石湯傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃同方里水者一身面目黃腫其脈沉小便不利故令病水越婢加朮湯得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者小茈胡湯上五法身黃小便不利或難證傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯男子黃小便自利小建中湯太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯黃疸病小便色不變欲自利腹病而喘噦者小半夏湯上四法身黃小便自利或瘀血證諸黃腹痛而嘔者小茈胡湯酒黃疸心中懊憹或熱痛者梔子大黃豉湯上二法黃疸腹痛證黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如蘗汁脈自沉黃耆桂枝苦酒湯黃汗之病云云又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀桂枝加黃耆湯上二法黃汗證下利門附便膿血傷寒醫下之續得下利清穀不止身疼痛者四逆湯脈浮而遲表熱裡寒下利清穀者同方吐利汗出發熱惡寒四肢拘急手足厥冷者同方既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者同方大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者同方大汗出大下利而厥冷者同方下利腹脹滿身體疼痛者同方少陰病下利清穀裡寒外熱手足厥逆脈微欲絕者通脈四逆湯下利清穀裡寒外熱汗出而厥者同方少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯上十法下利清穀厥逆證乾嘔下利者黃芩人參湯太陽與陽明合病自下利者黃芩湯若嘔者黃芩加半夏生薑湯乾嘔而下利者同方傷寒發熱汗出不解心下痞硬嘔吐而下利者大茈胡湯少陰病吐利手足厥冷煩躁欲死者吳茱萸湯少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯上六法嘔而下利證太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安甘草瀉心湯傷寒汗出解之後胃中不和心下痞硬乾嘔噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯病者脈伏其人慾自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯下利按之心下硬者急下之大承氣湯上五法心下痞硬而下利證熱利下重者白頭翁湯下利慾飲水者以有熱故也同方產後下利者白頭翁加甘草阿膠湯少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯下利脈遲而滑者內實也利未欲止當下之大承氣湯下利脈反滑當有所去下之乃愈同方下利不欲食者當下之同方下利差後至其年月日時復發者以病不盡故也同方太陽與陽明合病者必自下利葛根湯太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者真武湯傷寒服湯藥下利不止醫以理中與之利益甚赤石脂禹餘糧湯少陰病下利咽痛胸滿心煩者豬膚湯上十三法下利或熱或身疼證少陰病下利便膿血者桃花湯少陰病二三日至四五日腹痛小便不利下利不止便膿血者同方下利便膿血者同方上三法便膿血證水腫門附身重風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯里水者一身面目黃腫其脈沉小便不利故令病水越婢加朮湯里水若惡風者同方加附子里水麻黃甘草湯風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下當腫及陰難以屈伸防己黃耆湯風濕濕一作水脈浮身重汗出惡風者同方風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者桂枝甘草附子湯皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已麻黃附子甘草湯浮者杏子湯黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如蘗汁黃耆桂枝苦酒湯咳逆倚息不得臥云云其人形腫者苓甘姜味辛夏仁湯大病差後從腰已下有水氣者牡蠣澤瀉散肺癰胸滿脹一身面目浮腫鼻塞葶藶大棗湯上十三法一身水腫或小便不利證妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散腎著之病其人身體重腰中冷如坐水中形如水狀及不渴小便自利苓薑朮甘湯黃汗之病云云從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀桂枝加黃耆湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重心中懊憹舌上胎者梔子豉湯少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣真武湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱小承氣湯傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者茈胡加龍骨牡蠣湯上七法一身重或痛證短氣門胸痹胸中氣塞短氣者苓杏甘草湯同證橘皮枳實生薑湯夫短氣有微飲當從小便去之八味丸同證苓桂朮甘湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣桂枝甘草附子湯陽明中風脈弦浮大而短氣腹都滿脅下及心痛小茈胡湯麻黃湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱大承氣湯小承氣湯太陽病脈浮而動數膈內拒痛短氣躁煩心中懊憹心下因硬則為結胸大陷胸湯胸痹之病喘息咳唾胸背痛短氣者栝蔞薤白白酒湯太陽中風下利嘔逆云云乾嘔短氣汗出不惡寒者十棗湯上十法短氣或汗出身痛證發汗吐下後虛煩不得眠心中懊憹若少氣者梔子甘草豉湯傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯上二法少氣證咽痛門附咽喉不利少陰病咽中痛者半夏散及湯少陰痛二三日咽痛者甘草湯同證不差者桔梗湯少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之少陰病下利清穀裡寒外熱手足厥逆云云或咽痛者通脈四逆湯少陰病下利咽痛胸滿心煩者豬膚湯上六法咽中痛證病如桂枝證頭不痛項不強胸中痞硬氣上衝咽喉不得息者瓜蒂散咳逆倚息不得臥云云手足厥逆氣從小腹上衝胸咽手足痹云云苓桂五味甘草湯上二法上衝咽證大逆上氣咽喉不利者麥門冬湯婦人咽中如有炙臠半夏厚朴湯狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐甘草瀉心湯上三法咽喉不利證血證門附經水不調心氣不定吐血衄血者瀉心湯吐血不止者柏葉湯吐血衄血者黃土湯下血先便後血此遠血也同方下血先血後便此近血也赤小豆當歸散虛勞裡急悸衄腹中痛夢失精云云小建中湯傷寒脈浮緊不發汗因致衄者麻黃湯傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄桂枝湯上八法吐血衄血證太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈抵當湯太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也同方陽明證其人喜忘者必有畜血也同方病人無表裡證發熱七八日至六七日不大便者有瘀血也同方產婦腹痛以枳實芍藥散假令不愈者此為腹中有乾血著臍下下瘀血湯傷寒有熱少腹滿應小便不利今反利者為有血也抵當丸婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯太陽病不解熱結膀胱其人如狂血自下下者愈但少腹急結者桃核承氣湯陽明病云云但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯上九法瘀血證婦人中風七八日續得寒熱為熱入血室其血必結小茈胡湯婦人經水不利下者抵當湯經水不利下瘀血湯婦人宿有症病經水斷未及三月而得漏下不止胎動在臍上者桂枝茯苓丸婦人有漏下者或半產後因續下血都不絕者有妊娠下血者芎歸膠艾湯惡寒脈微而複利利止亡血也四逆加人參湯婦人經水閉不利藏堅癖不止中有乾血下白物者礬石丸帶下經水不利少腹滿痛經一月再見者土瓜根散上八法經水不調或亡血證不仁門寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治烏頭桂枝湯血痹病云云身體不仁如風痹之狀黃耆桂枝五物湯腳氣上入小腹不仁者八味丸二陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿白虎湯上四法不仁證心中懊憹門發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹者梔子豉湯若少氣者梔子甘草豉湯若嘔者梔子生薑豉湯陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯陽明病脈浮而緊咽燥口苦腹滿而喘心中懊憹舌上胎者同方黃疸心中懊憹或熱痛者梔子大黃豉湯陽明病下之心中懊憹而煩胃中有燥屎者大承氣湯太陽病脈浮而動數膈內拒痛短氣躁煩心中懊憹心下因硬則為結胸大陷胸湯上六法心中懊憹證身瞤門太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯黃汗之病云云若身重汗出已輒輕者久久必身瞤瞤即胸中痛云云桂枝加黃耆湯太陽中風脈緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也上三法身瞤證不得眠門附臥起不安虛勞虛煩不得眠者酸棗仁湯太陽病發汗後大汗出胃中干煩躁不得眠若小便不利微熱消渴者五苓散少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證乾薑附子湯發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹者梔子豉湯若少氣者梔子甘草豉湯若嘔者梔子生薑豉湯陽明病脈浮緊咽燥口苦腹滿而喘云云若加燒針必怵惕不得眠雲云梔子豉湯咳逆上氣時時唾濁但坐不得眠者皂莢丸上七法煩躁不得眠證產後腹痛煩滿不得臥者枳實芍藥散婦人病飲食如故煩熱不得臥而反倚息者八味丸少陰病得之二三日以上心中煩不得臥者黃連阿膠湯胸痹不得臥心痛徹背者栝蔞薤白半夏湯肺癰喘不得臥者葶藶大棗湯咳逆倚息不得臥者小青龍湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也大承氣湯上七法不得臥證傷寒下後心煩腹滿臥起不安者梔子厚朴湯狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐蝕於上部則聲喝甘草瀉心湯蝕於下部咽乾苦參湯洗之蝕於肛者雄黃薰之傷寒脈浮醫以火迫劫之必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣湯上三法臥起不安證讝語門陽明病讝語有潮熱反不能食者胃中必有燥屎也大承氣湯汗出讝語者以有燥屎在胃中也同方傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀但發熱讝語者同方二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者同方陽明病其人多汗以津液外出胃中燥大便必硬硬則讝語者小承氣湯大便不通噦數讝語者同方產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱食則讝語至夜即愈同方下利讝語者有燥屎也同方陽明病讝語發潮熱脈滑而疾者同方傷寒十三日不解過經讝語者以有熱也調胃承氣湯傷寒脈浮自汗出小便數心煩微惡寒腳攣急若胃氣不和讝語者同方傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者茈胡加龍骨牡蠣湯二陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿白虎湯本按本字玉函亡太陽病不解脅下硬滿乾嘔不能食往來寒熱尚未吐下者小茈胡湯若已吐下發汗溫針讝語茈胡證罷此為壞病以法治之上十四法讝語或有燥屎證發狂門太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈抵當湯太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也同方太陽病不解熱結膀胱其人如狂血自下下者愈但小腹急結者乃可攻之桃核承氣湯上三法有瘀血發狂證傷寒醫以火迫劫之必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣湯傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者茈胡加龍骨牡蠣湯上二法驚狂證癰膿門附肺痿咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿寒如米粥者為肺癰桔梗湯同證桔梗白散肺癰喘而不得臥者葶藶大棗湯肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞同方咳有微熱煩滿胸中甲錯是為肺癰葦莖湯癰膿以麥粥下之枳實芍藥散上六法肺癰證腸癰者小腹腫按之即痛如淋小便自調時時發熱自汗出復惡寒也大黃牡丹湯腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿薏苡附子敗醬散上二法腸癰證肺痿吐涎沫者桂枝去芍藥加皂莢湯肺痿咳唾涎沫不止咽燥而渴者生薑甘草湯肺痿吐涎沫而不咳者其人不渴必遺尿小便數甘草乾薑湯上三法肺痿證蛔蟲門蛔之為病令人吐涎心痛發作有時甘草粉蜜湯小兒疳蟲蝕齒一方蛔厥者其人當吐蛔令病者靜而復煩烏梅圓上三法蛔蟲證陰疾門溫陰中坐藥蛇床子散少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯陰狐疝氣者偏有大小時時上下蜘蛛散寒疝腹中絞痛拘急不得轉側發作有時使人陰縮手足厥逆烏頭湯夫失精家小腹弦急陰頭寒目眩發落桂枝加龍骨牡蠣湯風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下當腫及陰難以屈伸防己黃耆湯狐惑之為病狀如傷寒默默欲眠目不得閉起臥不安蝕於陰為狐苦參湯洗之雄黃薰陰癩腫土瓜根散胃氣下泄陰吹而喧者豬膏發煎上九法陰病證留飲門病懸飲者十棗湯支飲胸滿者厚朴大黃湯支飲不得息者葶藶大棗湯病溢飲者當發其汗大青龍湯小青龍湯上四法留飲證宿食門宿食在上脘當吐之瓜蒂散有宿食當下之大承氣湯大病差後勞復者若有宿食者枳實梔子豉湯上三法宿食證雜門婦人藏躁喜悲傷欲哭象如神靈所作數欠伸者甘麥大棗湯火邪桂枝去芍藥加蜀漆龍骨牡蠣湯腳氣衝心者礬石湯上各一法長沙正經證匯諸方小半夏湯半夏一升生薑半斤上二味以水七升煮取一升分溫再服小半夏加茯苓湯加茯苓三兩大半夏湯半夏二升白蜜一升人參三兩上三味以水一斗二升和蜜揚之二百四十遍煮取二升半溫服一升余分再服吳茱萸湯吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服大黃甘草湯大黃四兩甘草一兩上二味以水三升煮取一升分溫再服小茈胡湯茈胡半斤黃芩三兩人參甘草各三兩半夏半升大棗十二枚生薑三兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服乾薑人參半夏丸乾薑人參各一兩半夏二兩上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服乾薑黃連黃芩人參湯乾薑黃芩黃連人參各三兩上四味以水六升煮取二升去滓分溫再服葛根湯葛根四兩麻黃三兩桂枝芍藥各二兩生薑三兩甘草二兩大棗十二枚上七味㕮咀以水一斗先煮葛麻減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗葛根加半夏湯加半夏半升桂枝湯桂枝芍藥生薑各三兩甘草二兩大棗十二枚上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須更歠歡熱稀粥一升余以助藥力溫覆令一時許桂枝加桂湯加桂二兩桂枝加芍藥湯加芍藥三兩桂枝去芍藥湯去芍藥桂枝加葛根湯加葛根四兩桂枝加黃耆湯加黃耆二兩栝蔞桂枝湯加栝蔞根二兩桂枝加附子湯加附子一枚桂枝去芍藥加附子湯去芍藥加附子一枚桂枝加厚